version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:3001
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    environment:
      - BACKEND_URL=http://backend:3001
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - k8s-hub
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      - PORT=3001
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8080}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - k8s-hub
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Uncomment for resource limits:
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '0.5'
    #       memory: 256M
    #     reservations:
    #       cpus: '0.1'
    #       memory: 64M

networks:
  k8s-hub:
    driver: bridge

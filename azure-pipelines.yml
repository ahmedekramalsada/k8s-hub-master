# ═══════════════════════════════════════════════════════════════════
# Azure DevOps Pipeline — K8s Hub
# Builds Docker images, scans for vulnerabilities, pushes to Docker Hub,
# updates K8s manifests to trigger ArgoCD sync
# ═══════════════════════════════════════════════════════════════════

trigger:
  branches:
    include:
      - main
      - master
  paths:
    exclude:
      - "*.md"
      - "k3s/*"
      - "docs/*"
      - "mockup*.html"

pr: none

pool:
  vmImage: "ubuntu-latest"

variables:
  - group: dockerhub-credentials
  - name: FRONTEND_IMAGE
    value: $(DOCKERHUB_USERNAME)/k8s-hub
  - name: BACKEND_IMAGE
    value: $(DOCKERHUB_USERNAME)/k8s-hub-backend
  # Tag with git short SHA for traceability + build ID for uniqueness
  - name: IMAGE_TAG
    value: $(Build.BuildId)
  - name: GIT_SHA
    value: $[ variables['Build.SourceVersion'] ]
  - name: LATEST_TAG
    value: latest

stages:
  # ═══════════════════════════════════════════════════════════════
  # Stage 0: Validate YAML manifests
  # ═══════════════════════════════════════════════════════════════
  - stage: ValidateManifests
    displayName: "Validate K8s Manifests"
    jobs:
      - job: validateYaml
        displayName: "YAML Lint Check"
        steps:
          - script: |
              pip install yamllint
              yamllint -d relaxed k3s/manifests/*.yaml
            displayName: "Lint K8s YAML files"

  # ═══════════════════════════════════════════════════════════════
  # Stage 1: Build & Push Frontend
  # ═══════════════════════════════════════════════════════════════
  - stage: BuildFrontend
    displayName: "Build & Push Frontend"
    dependsOn: ValidateManifests
    jobs:
      - job: buildFrontend
        displayName: "Frontend Docker Build"
        steps:
          - task: Docker@2
            displayName: "Login to Docker Hub"
            inputs:
              containerRegistry: "Docker Hub"
              command: "login"

          - task: Docker@2
            displayName: "Build Frontend Image"
            inputs:
              containerRegistry: "Docker Hub"
              repository: "$(FRONTEND_IMAGE)"
              command: "build"
              Dockerfile: "Dockerfile"
              tags: |
                $(IMAGE_TAG)
                $(LATEST_TAG)

          - task: Docker@2
            displayName: "Push Frontend Image"
            inputs:
              containerRegistry: "Docker Hub"
              repository: "$(FRONTEND_IMAGE)"
              command: "push"
              tags: |
                $(IMAGE_TAG)
                $(LATEST_TAG)

          # Security scan with Trivy
          - script: |
              # Install Trivy
              sudo apt-get install wget apt-transport-https gnupg -y
              wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
              echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
              sudo apt-get update
              sudo apt-get install trivy -y

              # Scan the built image (pull from Docker Hub after push)
              trivy image --exit-code 0 --severity HIGH,CRITICAL --format table $(FRONTEND_IMAGE):$(IMAGE_TAG)
            displayName: "Trivy Scan — Frontend Image"
            condition: succeeded()

  # ═══════════════════════════════════════════════════════════════
  # Stage 2: Build & Push Backend
  # ═══════════════════════════════════════════════════════════════
  - stage: BuildBackend
    displayName: "Build & Push Backend"
    dependsOn: BuildFrontend
    jobs:
      - job: buildBackend
        displayName: "Backend Docker Build"
        steps:
          - task: Docker@2
            displayName: "Login to Docker Hub"
            inputs:
              containerRegistry: "Docker Hub"
              command: "login"

          - task: Docker@2
            displayName: "Build Backend Image"
            inputs:
              containerRegistry: "Docker Hub"
              repository: "$(BACKEND_IMAGE)"
              command: "build"
              Dockerfile: "backend/Dockerfile"
              buildContext: "backend"
              tags: |
                $(IMAGE_TAG)
                $(LATEST_TAG)

          - task: Docker@2
            displayName: "Push Backend Image"
            inputs:
              containerRegistry: "Docker Hub"
              repository: "$(BACKEND_IMAGE)"
              command: "push"
              tags: |
                $(IMAGE_TAG)
                $(LATEST_TAG)

          # Security scan with Trivy
          - script: |
              # Install Trivy
              sudo apt-get install wget apt-transport-https gnupg -y
              wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
              echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
              sudo apt-get update
              sudo apt-get install trivy -y

              # Scan the built image (pull from Docker Hub after push)
              trivy image --exit-code 0 --severity HIGH,CRITICAL --format table $(BACKEND_IMAGE):$(IMAGE_TAG)
            displayName: "Trivy Scan — Backend Image"
            condition: succeeded()

  # ═══════════════════════════════════════════════════════════════
  # Stage 3: Update image tags in k3s manifests → triggers ArgoCD
  # ═══════════════════════════════════════════════════════════════
  - stage: UpdateManifests
    displayName: "Update K8s Manifests"
    dependsOn: BuildBackend
    jobs:
      - job: updateManifests
        displayName: "Update image tags in k3s/"
        steps:
          - checkout: self
            persistCredentials: true
            fetchDepth: 0

          - script: |
              git config --global user.email "ci@azure-devops.com"
              git config --global user.name "Azure DevOps CI"

              # Checkout main branch (Azure DevOps detaches HEAD by default)
              git checkout main

              # Both containers are in the SAME file: k3s/manifests/deployment.yaml
              # sed matches any username before /k8s-hub and replaces the tag

              # Update frontend image tag
              sed -i "s|image: .*/k8s-hub:.*|image: $(DOCKERHUB_USERNAME)/k8s-hub:$(IMAGE_TAG)|" k3s/manifests/deployment.yaml

              # Update backend image tag
              sed -i "s|image: .*/k8s-hub-backend:.*|image: $(DOCKERHUB_USERNAME)/k8s-hub-backend:$(IMAGE_TAG)|" k3s/manifests/deployment.yaml

              # Commit and push
              git add k3s/manifests/
              git diff --staged --quiet || git commit -m "ci: update image tags to $(IMAGE_TAG) [skip ci]"
              git push origin main
            displayName: "Commit updated image tags"

# ═══════════════════════════════════════════════════════════════════
# Azure DevOps Pipeline — K8s Hub
# Builds Docker images, pushes to Docker Hub, updates K8s manifests
# ═══════════════════════════════════════════════════════════════════

trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - "*.md"
      - "k3s/*"
      - "mockup*.html"

pr: none

pool:
  vmImage: "ubuntu-latest"

variables:
  - group: dockerhub-credentials
  - name: FRONTEND_IMAGE
    value: $(DOCKERHUB_USERNAME)/k8s-hub
  - name: BACKEND_IMAGE
    value: $(DOCKERHUB_USERNAME)/k8s-hub-backend
  - name: IMAGE_TAG
    value: $(Build.BuildId)
  - name: LATEST_TAG
    value: latest

stages:
  # ═══════════════════════════════════════════════════════════════
  # Stage 1: Build & Push Frontend
  # ═══════════════════════════════════════════════════════════════
  - stage: BuildFrontend
    displayName: "Build & Push Frontend"
    jobs:
      - job: buildFrontend
        displayName: "Frontend Docker Build"
        steps:
          - task: Docker@2
            displayName: "Login to Docker Hub"
            inputs:
              containerRegistry: "Docker Hub"
              command: "login"

          - task: Docker@2
            displayName: "Build Frontend Image"
            inputs:
              containerRegistry: "Docker Hub"
              repository: "$(FRONTEND_IMAGE)"
              command: "build"
              Dockerfile: "Dockerfile"
              tags: |
                $(IMAGE_TAG)
                $(LATEST_TAG)

          - task: Docker@2
            displayName: "Push Frontend Image"
            inputs:
              containerRegistry: "Docker Hub"
              repository: "$(FRONTEND_IMAGE)"
              command: "push"
              tags: |
                $(IMAGE_TAG)
                $(LATEST_TAG)

  # ═══════════════════════════════════════════════════════════════
  # Stage 2: Build & Push Backend
  # ═══════════════════════════════════════════════════════════════
  - stage: BuildBackend
    displayName: "Build & Push Backend"
    dependsOn: BuildFrontend
    jobs:
      - job: buildBackend
        displayName: "Backend Docker Build"
        steps:
          - task: Docker@2
            displayName: "Login to Docker Hub"
            inputs:
              containerRegistry: "Docker Hub"
              command: "login"

          - task: Docker@2
            displayName: "Build Backend Image"
            inputs:
              containerRegistry: "Docker Hub"
              repository: "$(BACKEND_IMAGE)"
              command: "build"
              Dockerfile: "backend/Dockerfile"
              buildContext: "backend"
              tags: |
                $(IMAGE_TAG)
                $(LATEST_TAG)

          - task: Docker@2
            displayName: "Push Backend Image"
            inputs:
              containerRegistry: "Docker Hub"
              repository: "$(BACKEND_IMAGE)"
              command: "push"
              tags: |
                $(IMAGE_TAG)
                $(LATEST_TAG)

  # ═══════════════════════════════════════════════════════════════
  # Stage 3: Update image tags in k3s manifests → triggers ArgoCD
  # ═══════════════════════════════════════════════════════════════
  - stage: UpdateManifests
    displayName: "Update K8s Manifests"
    dependsOn: BuildBackend
    jobs:
      - job: updateManifests
        displayName: "Update image tags in k3s/"
        steps:
          - checkout: self
            persistCredentials: true

          - script: |
              git config --global user.email "ci@azure-devops.com"
              git config --global user.name "Azure DevOps CI"

              # Both containers are in the SAME file: k3s/manifests/deployment.yaml
              # sed matches any username before /k8s-hub and replaces the tag

              # Update frontend image tag
              sed -i "s|image: .*/k8s-hub:.*|image: $(DOCKERHUB_USERNAME)/k8s-hub:$(IMAGE_TAG)|" k3s/manifests/deployment.yaml

              # Update backend image tag
              sed -i "s|image: .*/k8s-hub-backend:.*|image: $(DOCKERHUB_USERNAME)/k8s-hub-backend:$(IMAGE_TAG)|" k3s/manifests/deployment.yaml

              # Commit and push
              git add k3s/manifests/
              git diff --staged --quiet || git commit -m "ci: update image tags to $(IMAGE_TAG) [skip ci]"
              git push origin HEAD
            displayName: "Commit updated image tags"

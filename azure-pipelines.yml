# ═══════════════════════════════════════════════════════════════════
# Azure DevOps Pipeline — K8s Hub
# Builds Docker images and pushes to Docker Hub
# ═══════════════════════════════════════════════════════════════════

trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - "*.md"
      - "k3s/*"
      - "mockup*.html"

pr: none

pool:
  vmImage: "ubuntu-latest"

variables:
  - group: dockerhub-credentials
  - name: FRONTEND_IMAGE
    value: $(DOCKERHUB_USERNAME)/k8s-hub
  - name: BACKEND_IMAGE
    value: $(DOCKERHUB_USERNAME)/k8s-hub-backend
  - name: IMAGE_TAG
    value: $(Build.BuildId)
  - name: LATEST_TAG
    value: latest

stages:
  # ═══════════════════════════════════════════════════════════════
  # Stage 1: Build & Push Frontend
  # ═══════════════════════════════════════════════════════════════
  - stage: BuildFrontend
    displayName: "Build & Push Frontend"
    jobs:
      - job: buildFrontend
        displayName: "Frontend Docker Build"
        steps:
          - task: Docker@2
            displayName: "Login to Docker Hub"
            inputs:
              containerRegistry: "Docker Hub"
              command: "login"

          - task: Docker@2
            displayName: "Build Frontend Image"
            inputs:
              containerRegistry: "Docker Hub"
              repository: "$(FRONTEND_IMAGE)"
              command: "build"
              Dockerfile: "Dockerfile"
              tags: |
                $(IMAGE_TAG)
                $(LATEST_TAG)

          - task: Docker@2
            displayName: "Push Frontend Image"
            inputs:
              containerRegistry: "Docker Hub"
              repository: "$(FRONTEND_IMAGE)"
              command: "push"
              tags: |
                $(IMAGE_TAG)
                $(LATEST_TAG)

  # ═══════════════════════════════════════════════════════════════
  # Stage 2: Build & Push Backend
  # ═══════════════════════════════════════════════════════════════
  - stage: BuildBackend
    displayName: "Build & Push Backend"
    dependsOn: BuildFrontend
    jobs:
      - job: buildBackend
        displayName: "Backend Docker Build"
        steps:
          - task: Docker@2
            displayName: "Login to Docker Hub"
            inputs:
              containerRegistry: "Docker Hub"
              command: "login"

          - task: Docker@2
            displayName: "Build Backend Image"
            inputs:
              containerRegistry: "Docker Hub"
              repository: "$(BACKEND_IMAGE)"
              command: "build"
              Dockerfile: "backend/Dockerfile"
              buildContext: "backend"
              tags: |
                $(IMAGE_TAG)
                $(LATEST_TAG)

          - task: Docker@2
            displayName: "Push Backend Image"
            inputs:
              containerRegistry: "Docker Hub"
              repository: "$(BACKEND_IMAGE)"
              command: "push"
              tags: |
                $(IMAGE_TAG)
                $(LATEST_TAG)

# ─────────────────────────────────────────────────────────────
# ArgoCD Application — External Secrets Operator (ESO)
# Installs ESO which syncs secrets from Infisical to K8s
# ─────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.14.1
    helm:
      values: |
        installCRDs: true
        webhook:
          enabled: true
        certController:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

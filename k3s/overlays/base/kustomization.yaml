# ─────────────────────────────────────────────────────────────
# Kustomize Base — Shared configuration for all environments
#
# WHAT IS KUSTOMIZE?
#   Kustomize lets you customize raw YAML files without
#   templating. You define a "base" (shared config) and
#   "overlays" (environment-specific changes).
#
#   Unlike Helm, Kustomize doesn't use {{ .Values }}.
#   It uses strategic merge patches — clean, readable YAML.
#
# HOW IT WORKS:
#   1. base/ defines the common resources
#   2. dev/ patches: 1 replica, debug mode
#   3. prod/ patches: 3 replicas, resource limits
#
# USAGE:
#   kubectl apply -k k3s/overlays/dev
#   kubectl apply -k k3s/overlays/prod
# ─────────────────────────────────────────────────────────────
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../manifests/namespace.yaml
  - ../../manifests/deployment.yaml
  - ../../manifests/service.yaml
  - ../../manifests/ingress.yaml
  - ../../manifests/networkpolicy.yaml
  - ../../manifests/pdb.yaml
  - ../../manifests/hpa.yaml
  - ../../manifests/servicemonitor.yaml
  - ../../manifests/secret-store.yaml
  - ../../manifests/external-secret.yaml

commonLabels:
  managed-by: kustomize

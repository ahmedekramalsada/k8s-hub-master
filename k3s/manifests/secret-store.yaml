# ─────────────────────────────────────────────────────────────
# ClusterSecretStore — tells ESO how to connect to Infisical
#
# REQUIRES:
#   1. External Secrets Operator installed (see apps/eso.yaml)
#   2. Infisical credentials secret created (see infisical-credentials.yaml)
#
# SETUP IN INFISICAL:
#   1. Go to Access Control > Machine Identities
#   2. Create a machine identity with Universal Auth
#   3. Grant it read access to your project
#   4. Save the Client ID and Client Secret
# ─────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: infisical-store
spec:
  provider:
    infisical:
      # US region: https://app.infisical.com
      # EU region: https://eu.infisical.com
      hostAPI: https://app.infisical.com

      auth:
        universalAuthCredentials:
          clientId:
            name: infisical-credentials
            key: client-id
            namespace: k8s-hub
          clientSecret:
            name: infisical-credentials
            key: client-secret
            namespace: k8s-hub

      secretsScope:
        # ← Change these to match your Infisical project
        projectSlug: my-k8s-hub-project
        environmentSlug: dev
        secretsPath: "/"

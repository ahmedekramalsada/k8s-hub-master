# ─────────────────────────────────────────────────────────────
# ExternalSecret — pulls secrets from Infisical into K8s
#
# HOW IT WORKS:
#   1. ESO reads this manifest
#   2. Authenticates with Infisical using machine identity
#   3. Fetches the secret value from the specified path
#   4. Creates a native K8s Secret called "k8s-hub-secrets"
#   5. Refreshes every 1h (picks up changes)
#
# INFISICAL SECRET PATHS:
#   Use the format: "/folder/SECRET_NAME"
#   Root level:     "SECRET_NAME"
# ─────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: k8s-hub-external-secret
  namespace: k8s-hub
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: infisical-store
    kind: ClusterSecretStore

  target:
    name: k8s-hub-secrets
    creationPolicy: Owner

  data:
    # The OpenRouter API key for AI features
    # In Infisical, create this secret at path "/" with name "OPENROUTER_API_KEY"
    - secretKey: openrouter-api-key
      remoteRef:
        key: "OPENROUTER_API_KEY"

# ─────────────────────────────────────────────────────────────
# Infisical Credentials Secret
#
# ⚠️  THIS FILE IS FOR REFERENCE ONLY — DO NOT APPLY VIA ARGOCD
#
# The bootstrap script creates this secret automatically.
# See: bootstrap/1-install-argocd.sh
#
# Manual creation:
#   kubectl create namespace k8s-hub --dry-run=client -o yaml | kubectl apply -f -
#   kubectl create secret generic infisical-credentials \
#     --namespace k8s-hub \
#     --from-literal=client-id="YOUR_CLIENT_ID" \
#     --from-literal=client-secret="YOpUR_CLIENT_SECRET"
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: infisical-credentials
  namespace: k8s-hub
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous
type: Opaque

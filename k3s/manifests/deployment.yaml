apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-hub
  namespace: k8s-hub
  labels:
    app: k8s-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-hub
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: k8s-hub
    spec:
      # ── Pod-level security (PSS Restricted) ──
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      containers:
        # ── Frontend (nginx) ──
        - name: frontend
          image: ahmedekramalsada/k8s-hub:230
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          env:
            - name: BACKEND_URL
              value: "http://localhost:3001"
          resources:
            requests:
              cpu: 30m
              memory: 48Mi
            limits:
              cpu: 150m
              memory: 96Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          # ── Container-level security ──
          securityContext:
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-client-body
              mountPath: /etc/nginx/client-body

        # ── Backend (node) ──
        - name: backend
          image: ahmedekramalsada/k8s-hub-backend:230
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              name: api
              protocol: TCP
          env:
            - name: PORT
              value: "3001"
            - name: NODE_ENV
              value: "production"
            - name: FRONTEND_URL
              value: "http://localhost:8080,https://localhost:8080"
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: k8s-hub-secrets
                  key: openrouter-api-key
                  optional: true
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 300m
              memory: 192Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
          # ── Container-level security ──
          securityContext:
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: nginx-cache
          emptyDir:
            sizeLimit: 50Mi
        - name: nginx-run
          emptyDir:
            sizeLimit: 1Mi
        - name: nginx-client-body
          emptyDir:
            sizeLimit: 50Mi
